server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Production: the SPA is built with absolute API URLs (api-aira.isiri.rw),
  # so the container only serves static assets. The host's CloudPanel nginx
  # terminates TLS and routes the API domain to the backend separately.
  location / {
    try_files $uri /index.html;
  }
}
