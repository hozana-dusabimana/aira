services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: aira
      MYSQL_USER: aira
      MYSQL_PASSWORD: airapass
    ports:
      - "3307:3306"          # 3307 on host to avoid clashing with XAMPP's MySQL
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      args:
        # Set INSTALL_ML=1 to bake the ~2 GB vision-language stack into the image.
        INSTALL_ML: "${INSTALL_ML:-0}"
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: mysql+pymysql://aira:airapass@mysql:3306/aira
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      JWT_SECRET: change-me-in-prod-please-32-chars-minimum
      CORS_ORIGINS: "http://192.168.1.64:5173,http://192.168.1.64:8000,http://localhost:5173,http://localhost"
      AUTO_SEED: "true"
      AI_ENABLED: "${AI_ENABLED:-false}"
      UPLOAD_DIR: /app/uploads
      RATE_LIMIT_ENABLED: "${RATE_LIMIT_ENABLED:-true}"
      RATE_LIMIT_USE_REDIS: "true"
      EMAIL_ENABLED: "${EMAIL_ENABLED:-false}"
      SMTP_HOST: "${SMTP_HOST:-localhost}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_FROM: "${SMTP_FROM:-AIRA <no-reply@aira.local>}"
      FCM_SERVER_KEY: "${FCM_SERVER_KEY:-}"
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads

  worker:
    build:
      context: ./backend
      args:
        INSTALL_ML: "${INSTALL_ML:-0}"
    restart: unless-stopped
    depends_on:
      - backend
      - redis
    command: celery -A app.tasks.celery_app:celery_app worker --loglevel=info
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks.celery_app:celery_app inspect ping -t 5 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      DATABASE_URL: mysql+pymysql://aira:airapass@mysql:3306/aira
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      JWT_SECRET: change-me-in-prod-please-32-chars-minimum
      AI_ENABLED: "${AI_ENABLED:-false}"
      UPLOAD_DIR: /app/uploads
      FCM_SERVER_KEY: "${FCM_SERVER_KEY:-}"
    volumes:
      - backend_uploads:/app/uploads

  dashboard:
    build:
      context: ./police_dashboard
      args:
        VITE_API_BASE_URL: "http://192.168.1.64:8000/api/v1"
        VITE_BACKEND_ORIGIN: "http://192.168.1.64:8000"
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mysql_data:
  backend_uploads:
